name: tests

on:
  push:
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pip install -e ".[test]"
      - name: Parity tests (torch ≈ numpy ≈ JS)
        run: pytest -q
      - name: Headless demo smoke
        run: node tests/dom_smoke.mjs
